name: Docker publish

# Runs only on version tags (v0.0.1, v1.2.3, ...) so that a plain push to
# master never triggers a Docker Hub publish — publishing is an explicit,
# tagged-release action, not something that happens on every commit.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Requires two repo secrets (Settings -> Secrets and variables ->
      # Actions): DOCKERHUB_USERNAME and DOCKERHUB_TOKEN (a Docker Hub
      # access token, not your account password).
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: tuannm99/dmox
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
