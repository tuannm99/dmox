# Local-only dev convenience layer, auto-merged on top of docker-compose.yml
# by `docker compose up` (no -f flag needed). NOT for the published image —
# Dockerfile/docker-compose.yml stay self-contained and portable; this file
# just bind-mounts *this host's* node/claude toolchain into the Terminal
# panel's shell so `node`/`npm`/`claude` work there like they do outside
# Docker, without baking them into the image (see README's Docker security
# notes — same no-auth-Terminal caveat applies here, mounting doesn't reduce
# it, it just avoids installing a duplicate copy at build time).
services:
  dmox:
    # Match the host user so bind-mounted ~/.claude files (some 600,
    # owner-only) stay readable/writable — overrides the image's dedicated
    # uid 10001 for this local-dev path only.
    user: '1000:1000'
    environment:
      # Overriding `user:` to a raw uid with no /etc/passwd entry leaves
      # $HOME unresolved (defaults to `/`), so claude/npm would look for
      # config at /.claude, /.claude.json etc instead of where we actually
      # mount them below. Pin it explicitly.
      HOME: /app
      PATH: '/opt/host-node/bin:/opt/host-claude:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin'
    volumes:
      - ${HOME}/.nvm/versions/node/v24.15.0:/opt/host-node:ro
      - ${HOME}/.local/share/claude/versions/2.1.215:/opt/host-claude/claude:ro
      - ${HOME}/.claude:/app/.claude
      # Swap the base compose file's tracked example config for the repo's
      # own config.yaml (tracked, but locally modified to point at a real
      # workspace — never committed, see `git status`). Compose merges
      # volumes by target path, so this replaces the base file's
      # ./config.docker-example.yaml mount at the same /app/config.yaml
      # target rather than adding a second, conflicting one.
      - ./config.yaml:/app/config.yaml:ro
      # Account/session state claude keeps directly under $HOME (separate
      # from ~/.claude/), needed alongside .claude/.credentials.json for it
      # to recognize you as already logged in.
      - ${HOME}/.claude.json:/app/.claude.json
      # /app itself is baked chown'd to uid 10001 (the image's default
      # non-root user), not uid 1000, so `data_dir: ~/.dmox` (-> /app/.dmox
      # with HOME pinned above) can't be created by this override's user.
      # Bind-mounting a plain host dir here sidesteps that: it's naturally
      # owned by uid 1000 since the host user creates it.
      - ${HOME}/.dmox-docker-dev:/app/.dmox
      # config.yaml's source path (../podzone/docs/) resolves relative to
      # WORKDIR /app inside the container, i.e. /podzone/docs — mount the
      # real sibling checkout there. Host-specific: adjust/remove if your
      # workspace source lives somewhere else.
      - ${HOME}/dev/local/podzone/docs:/podzone/docs:ro
